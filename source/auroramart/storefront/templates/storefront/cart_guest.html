<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Cart | Aurora Mart</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        :root {
            --bg:#020617;
            --surface:#020617;
            --line:#1e293b;
            --text:#e5e7eb;
            --muted:#9ca3af;
            --accent-1:#22d3ee;
            --accent-2:#4f46e5;
            --accent-3:#a855f7;
        }

        * { box-sizing:border-box; }

        body {
            margin:0;
            font-family:system-ui,-apple-system,Segoe UI,Roboto,Inter,Arial;
            background:radial-gradient(circle at top left,#0b1220,#020617 45%,#000 100%);
            color:var(--text);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            text-align:center;
            padding:20px;
        }

        .box {
            max-width:480px;
            background:radial-gradient(circle at top,#0b1120,#020617 70%);
            padding:40px 32px;
            border-radius:18px;
            border:1px solid var(--line);
            box-shadow:0 22px 52px rgba(15,23,42,0.95);
        }

        h2 {
            margin:0 0 12px;
            font-size:26px;
            letter-spacing:-0.02em;
        }

        p {
            color:var(--muted);
            font-size:15px;
            margin-bottom:22px;
        }

        a.btn {
            display:inline-flex;
            align-items:center;
            justify-content:center;
            padding:12px 24px;
            border-radius:999px;
            text-decoration:none;
            font-weight:600;
            font-size:15px;
            color:#f9fafb;
            background:linear-gradient(90deg,var(--accent-1),var(--accent-2),var(--accent-3));
            background-size:200% 100%;
            box-shadow:0 12px 30px rgba(15,23,42,0.9);
            transition:background-position .18s ease,
                       transform .12s ease,
                       box-shadow .18s ease;
        }

        a.btn:hover {
            background-position:100% 0;
            transform:translateY(-1px);
            box-shadow:0 18px 40px rgba(15,23,42,1);
        }
    </style>
</head>

<body>
    <div class="box">
        <h2>🛒 Your Cart</h2>
        <p>You’re not logged in, so your saved cart is currently empty.</p>

        <a href="{% url 'login' %}" class="btn">
            Log in to view your cart →
        </a>
    </div>
</body>
</html>
