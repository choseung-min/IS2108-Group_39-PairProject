{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Check Your Email | Aurora Mart</title>
  <style>
    :root {
      --bg:#020617;
      --surface:#020617;
      --line:#1e293b;
      --text:#e5e7eb;
      --muted:#9ca3af;
      --accent-1:#22d3ee;
      --accent-2:#4f46e5;
      --accent-3:#a855f7;
    }

    * { box-sizing:border-box; }

    body {
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
      color:var(--text);
      background:radial-gradient(circle at top left,#0b1220,#020617 45%,#000 100%);
    }

    .wrap {
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:24px;
    }

    .card {
      width:100%;
      max-width:520px;
      background:radial-gradient(circle at top,#0b1120,#020617 70%);
      border:1px solid var(--line);
      border-radius:18px;
      padding:40px 36px;
      text-align:center;
      box-shadow:0 22px 52px rgba(15,23,42,0.95);
    }

    .logo {
      display:block;
      margin:0 auto 20px;
      height:72px;
      filter:drop-shadow(0 0 14px rgba(34,211,238,0.45));
    }

    h1 {
      margin:6px 0 12px;
      font-size:26px;
      letter-spacing:-0.02em;
      color:#f9fafb;
    }

    .muted {
      color:var(--muted);
      font-size:15px;
      margin:0 0 20px;
      line-height:1.45;
    }

    .btn {
      display:inline-block;
      border-radius:999px;
      padding:12px 20px;
      font-weight:600;
      font-size:15px;
      color:#fff;
      text-decoration:none;

      background:linear-gradient(90deg,
        var(--accent-1),
        var(--accent-2),
        var(--accent-3)
      );
      background-size:200% 100%;
      box-shadow:0 12px 30px rgba(15,23,42,0.9);

      transition:background-position .18s ease,
                transform .12s ease,
                box-shadow .18s ease;
    }

    .btn:hover {
      background-position:100% 0;
      transform:translateY(-1px);
      box-shadow:0 18px 40px rgba(15,23,42,1);
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <img src="{% static 'img/AuroraMart Logo.png' %}" alt="Aurora Mart" class="logo">
      <h1>Check your email</h1>
      <p class="muted">If an account exists for that address, we’ve sent a link to reset your password.</p>
      <a class="btn" href="{% url 'login' %}">Return to Login</a>
    </section>
  </main>
</body>
</html>
