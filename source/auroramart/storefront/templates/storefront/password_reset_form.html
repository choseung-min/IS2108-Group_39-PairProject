{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Forgot Password | Aurora Mart</title>
  <style>
    :root{
      --bg:#020617;
      --surface:#020617;
      --line:#1e293b;
      --text:#e5e7eb;
      --muted:#9ca3af;
      --accent-1:#22d3ee;
      --accent-2:#4f46e5;
      --accent-3:#a855f7;
    }

    * { box-sizing:border-box; }

    body {
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
      color:var(--text);
      background:radial-gradient(circle at top left,#0b1220,#020617 45%,#000 100%);
    }

    .wrap {
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:24px;
    }

    .card {
      width:100%;
      max-width:520px;
      background:radial-gradient(circle at top,#0b1120,#020617 70%);
      border:1px solid var(--line);
      border-radius:18px;
      padding:36px;
      box-shadow:0 22px 52px rgba(15,23,42,0.95);
    }

    .logo {
      display:block;
      margin:0 auto 10px;
      height:72px;
      filter:drop-shadow(0 0 14px rgba(34,211,238,0.45));
    }

    h1 {
      margin:8px 0 16px;
      text-align:center;
      font-size:26px;
      letter-spacing:-0.02em;
      color:#f8fafc;
    }

    .muted {
      color:var(--muted);
      font-size:14px;
      text-align:center;
      margin-bottom:22px;
    }

    label {
      display:block;
      margin:12px 0 6px;
      font-weight:600;
      font-size:14px;
      color:var(--text);
    }

    input[type="email"],
    input[type="text"],
    input[type="password"] {
      width:100%;
      padding:12px 14px;
      border-radius:12px;
      font-size:15px;
      color:var(--text);
      background:#020617;
      border:1px solid var(--line);
      transition:border-color .18s ease, box-shadow .18s ease, background .18s ease;
    }

    input::placeholder {
      color:rgba(148,163,184,0.9);
    }

    input:focus {
      outline:none;
      border-color:var(--accent-1);
      background:#010a18;
      box-shadow:
        0 0 0 1px rgba(34,211,238,0.5),
        0 0 30px rgba(79,70,229,0.55);
    }

    .actions {
      margin-top:16px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }

    button.btn {
      padding:12px 18px;
      border-radius:999px;
      border:0;
      cursor:pointer;
      font-size:15px;
      font-weight:600;
      color:#f9fafb;
      background:linear-gradient(90deg,
        var(--accent-1),
        var(--accent-2),
        var(--accent-3)
      );
      background-size:200% 100%;
      box-shadow:0 12px 32px rgba(15,23,42,0.9);
      transition:background-position .18s ease, transform .12s ease, box-shadow .18s ease;
    }

    button.btn:hover {
      background-position:100% 0;
      transform:translateY(-1px);
      box-shadow:0 18px 42px rgba(15,23,42,1);
    }

    .link {
      color:var(--muted);
      text-decoration:underline;
      text-underline-offset:3px;
      font-size:14px;
      transition:color .16s ease;
    }

    .link:hover {
      color:#f8fafc;
    }

    @media(max-width:480px){
      .card { padding:28px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <img src="{% static 'img/AuroraMart Logo.png' %}" alt="Aurora Mart" class="logo">
      <h1>Forgot your password?</h1>
      <p class="muted">Enter your registered email and we'll send you a reset link.</p>

      <form method="post">{% csrf_token %}
        {{ form.email.errors }}
        <label for="{{ form.email.id_for_label }}">Email</label>
        {{ form.email }}
        <div class="actions">
          <a class="link" href="{% url 'login' %}">Back to Login</a>
          <button class="btn" type="submit">Send reset link</button>
        </div>
      </form>
    </section>
  </main>
</body>
</html>
