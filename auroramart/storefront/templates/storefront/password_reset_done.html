{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Check Your Email | Aurora Mart</title>
  <style>
    :root{--line:#e5e7eb;--text:#0f172a;--muted:#6b7280;--btn:#111827}
    *{box-sizing:border-box} body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;background:#f6f7f9;color:var(--text)}
    .wrap{min-height:100vh;display:grid;place-items:center;padding:24px}
    .card{width:100%;max-width:520px;background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,.06);padding:36px;text-align:center}
    .logo{display:block;margin:0 auto 10px;height:64px}
    h1{margin:8px 0 12px;font-size:26px}
    .muted{color:var(--muted);font-size:15px;margin:0 0 18px}
    .btn{display:inline-block;background:var(--btn);color:#fff;border:0;border-radius:10px;padding:12px 16px;font-weight:700;text-decoration:none}
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <img src="{% static 'img/AuroraMart Logo.png' %}" alt="Aurora Mart" class="logo">
      <h1>Check your email</h1>
      <p class="muted">If an account exists for that address, we’ve sent a link to reset your password.</p>
      <a class="btn" href="{% url 'login' %}">Return to Login</a>
    </section>
  </main>
</body>
</html>
