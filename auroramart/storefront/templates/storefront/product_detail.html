{% load static %}
<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>{{ product.name }} – Aurora Mart</title>
        <style>
    .wrap{
        max-width:1000px;
        margin:auto;padding:24px;
        font-family:system-ui;
    }
    .row{
        display:grid;
        grid-template-columns: 1fr 1.2fr;
        gap:24px;
    }
    .img{
        background:#f7f7f7;
        border:1px solid #eee;
        aspect-ratio:1/1;display:flex;align-items:center;
        justify-content:center;
    }
    .price{
        font-weight:700;
        font-size:20px;
        margin:6px 0 12px;
    }
    input[type=number]{
        width:80px;
        padding:8px;
    }
    .btn{
        padding:10px 14px;
        border-radius:8px;
        border:1px solid #ddd;
        background:#111;
        color:#fff;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <a href="{% url 'home2' %}">← Back</a>
    <div class="row" style="margin-top:16px;">
      <div class="img">
        <img src="{% static 'img/Placeholder Img.png' %}" alt="{{ product.name }}" style="max-width:100%;max-height:100%;">
      </div>
      <div>
        <h1 style="margin:0 0 8px">{{ product.name }}</h1>
        <div class="price">${{ product.price }}</div>
        <p>{{ product.description|default:"No description." }}</p>

        <form method="post">
          {% csrf_token %}
          <label>Qty</label>
          <input type="number" name="quantity" value="1" min="1">
          <button class="btn" type="submit">Add to cart</button>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
